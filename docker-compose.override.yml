version: "3.8"

services:
  backend:
    volumes:
      - ./backend:/app
      - /app/node_modules
    # Ensure migrations and seed run on dev boot, then start dev server
    entrypoint: >
      sh -c "npm run migration:run && npm run seed && npm run dev"

  frontend:
    volumes:
      - .:/app
      - /app/node_modules
    # Vite dev server binding to 0.0.0.0 for container access
    command: ["npm", "run", "dev", "--", "--host"]
